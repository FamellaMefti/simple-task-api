services:
  app:
    build: .
    container_name: simple-task-api
    ports:
      - "8080:3000"
    restart: unless-stopped
    environment:
      - PORT=3000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:3000/health').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
